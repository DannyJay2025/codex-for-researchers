name: Project checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run project checks
        run: python scripts/check_project.py
      - name: Run delivery quality sample checks
        run: |
          python scripts/check_delivery.py deliverables/paper-reading-brief/sample.md --service paper-reading
          python scripts/check_delivery.py deliverables/citation-audit/sample.md --service citation-audit
          python scripts/check_delivery.py deliverables/reproducibility-audit/sample.md --service repro-audit
      - name: Run growth metrics smoke test
        run: python scripts/summarize_growth.py ops/growth-metrics-template.csv
      - name: Run offer ladder smoke test
        run: |
          python scripts/suggest_offer.py --after-service paper-reading
          python scripts/suggest_offer.py --after-service citation-audit
          python scripts/suggest_offer.py --after-service repro-audit
      - name: Run reproducibility audit smoke test
        run: python skills/reproducibility-packager/scripts/audit_reproducibility.py .
