name: Project checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run project checks
        run: python scripts/check_project.py
      - name: Run reproducibility audit smoke test
        run: python skills/reproducibility-packager/scripts/audit_reproducibility.py .
